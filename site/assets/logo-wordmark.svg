<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" role="img" aria-label="Allusion">
  <!-- Direction 1 — Wordmark, italic lowercase Newsreader with Ochre dot on the 'i' -->
  <style>
    .word { font-family: 'Newsreader', Georgia, serif; font-style: italic; font-weight: 400; font-size: 120px; }
  </style>
  <!-- Wordmark, italic, lowercase, Bone-on-transparent -->
  <text class="word" x="0" y="118" fill="#ECEAE2">allus</text>
  <text class="word" x="300" y="118" fill="#ECEAE2">on</text>
  <!-- Replace the 'i' stem with a clean stroke + Ochre dot -->
  <rect x="278" y="56" width="6" height="62" rx="1" fill="#ECEAE2"/>
  <circle cx="281" cy="40" r="9" fill="#C8932E"/>
</svg>
